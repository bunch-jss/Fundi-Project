<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0a0f1a">
<meta name="description" content="FundiLink PWA">
<title>FundiLink</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- LOGIN -->
<div id="login">
  <div class="brand">Fundi<span>Link</span></div>
  <div class="tagline">Platform for Fundis · Merchants · Admins</div>

  <div class="login-card">
    <!-- Role tabs -->
    <div class="login-tabs">
      <button class="login-tab tab-admin active" id="lt-admin" onclick="switchLoginTab('admin')">🛡️ Admin</button>
      <button class="login-tab tab-fundi" id="lt-fundi" onclick="switchLoginTab('fundi')">🔧 Fundi</button>
      <button class="login-tab tab-merchant" id="lt-merchant" onclick="switchLoginTab('merchant')">🏪 Merchant</button>
    </div>

    <!-- Error -->
    <div class="login-err" id="login-err">Incorrect email or password. Please try again.</div>

    <!-- Form -->
    <div class="login-field">
      <label>Email Address</label>
      <input type="email" id="l-email" placeholder="you@example.com" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <div class="login-field">
      <label>
        Password
        <span style="cursor:pointer;font-size:.7rem;color:var(--muted)" onclick="togglePw()">Show</span>
      </label>
      <input type="password" id="l-pw" placeholder="••••••••" onkeydown="if(event.key==='Enter')doLogin()">
    </div>
    <button class="login-btn login-btn-admin" id="login-btn" onclick="doLogin()">Sign In as Admin</button>

    <!-- Demo accounts hint -->
    <div class="demo-hint">
      <div class="demo-hint-title">Demo accounts — click to fill</div>
      <div id="demo-users-list"></div>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <header class="app-header">
    <div class="hdr-logo">Fundi<span>Link</span></div>
    <div class="hdr-right">
      <div style="display:flex;align-items:center;gap:.6rem">
        <div class="avatar av-sm" id="hdr-av"></div>
        <div class="hdr-info">
          <div class="name" id="hdr-name"></div>
          <div class="role" id="hdr-role"></div>
        </div>
      </div>
      <button class="btn-logout" onclick="logout()">Logout</button>
    </div>
  </header>
  <nav class="app-nav" id="app-nav"></nav>
  <main class="app-main" id="app-main"></main>
</div>

<!-- MODAL -->
<div class="overlay hidden" id="modal-overlay" onclick="closeModalOnBg(event)">
  <div class="modal" id="modal-box">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div id="modal-content"></div>
  </div>
</div>

<!-- TOASTS -->
<div class="toast-wrap" id="toast-wrap"></div>
<script src="script.js"></script>          
</body>
</html>
